---
# Minimal Authelia configuration for testing

theme: light
server:
  address: 'tcp://0.0.0.0:9091'

log:
  level: info

authentication_backend:
  file:
    path: /config/users_database.yml
    password:
      algorithm: argon2id
      iterations: 1
      salt_length: 16
      parallelism: 8
      memory: 1024

access_control:
  default_policy: deny
  rules:
    - domain: "*.test.local"
      policy: one_factor
    - domain: "test.local"
      policy: one_factor

session:
  secret: insecure_session_secret_for_testing_only_32chars
  expiration: 1h
  inactivity: 5m
  cookies:
    - domain: test.local
      authelia_url: https://authelia.test.local:8443

regulation:
  max_retries: 3
  find_time: 2m
  ban_time: 5m

storage:
  encryption_key: this_is_a_test_key_32_characters_long_ok
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

identity_validation:
  reset_password:
    jwt_secret: test_jwt_secret_for_password_reset_32char
