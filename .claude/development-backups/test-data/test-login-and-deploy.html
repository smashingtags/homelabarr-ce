<!DOCTYPE html>
<html>
<head>
    <title>Test Login and Deployment</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        .section {
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input {
            padding: 5px;
            margin: 5px;
            width: 200px;
        }
        button {
            padding: 8px 15px;
            margin: 5px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
        pre {
            background-color: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .success {
            color: green;
            font-weight: bold;
        }
        .error {
            color: red;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>HomelabARR Authentication & Deployment Test</h1>
    
    <div class="section">
        <h2>1. Login Test</h2>
        <p>Default credentials: admin / admin</p>
        <div>
            <input type="text" id="username" placeholder="Username" value="admin">
            <input type="password" id="password" placeholder="Password" value="admin">
            <button onclick="testLogin()">Test Login</button>
        </div>
        <pre id="loginResult"></pre>
    </div>

    <div class="section">
        <h2>2. Get Applications (requires login)</h2>
        <button onclick="getApplications()" id="getAppsBtn" disabled>Get Applications</button>
        <pre id="appsResult"></pre>
    </div>

    <div class="section">
        <h2>3. Deploy Container (requires login)</h2>
        <button onclick="testDeploy()" id="deployBtn" disabled>Deploy AMD Container</button>
        <pre id="deployResult"></pre>
    </div>

    <script>
        let authToken = null;

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('loginResult');
            
            resultDiv.textContent = 'Attempting login...';

            try {
                const response = await fetch('http://localhost:35002/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();
                
                if (response.ok && result.token) {
                    authToken = result.token;
                    resultDiv.innerHTML = `<span class="success">Login successful!</span>\n${JSON.stringify(result, null, 2)}`;
                    
                    // Enable other buttons
                    document.getElementById('getAppsBtn').disabled = false;
                    document.getElementById('deployBtn').disabled = false;
                } else {
                    resultDiv.innerHTML = `<span class="error">Login failed!</span>\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error:</span> ${error.message}`;
            }
        }

        async function getApplications() {
            const resultDiv = document.getElementById('appsResult');
            resultDiv.textContent = 'Fetching applications...';

            try {
                const response = await fetch('http://localhost:35002/api/cli/catalog', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    }
                });

                const result = await response.json();
                
                if (response.ok) {
                    const appCount = result.applications ? result.applications.length : 0;
                    resultDiv.innerHTML = `<span class="success">Found ${appCount} applications!</span>\n${JSON.stringify(result, null, 2).substring(0, 1000)}...`;
                } else {
                    resultDiv.innerHTML = `<span class="error">Failed to get applications!</span>\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error:</span> ${error.message}`;
            }
        }

        async function testDeploy() {
            const resultDiv = document.getElementById('deployResult');
            resultDiv.textContent = 'Testing deployment with authentication...';

            try {
                const response = await fetch('http://localhost:35002/deploy', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        appId: 'local-mode-apps-amd',
                        config: {
                            domain: 'localhost',
                            port: '8201'
                        },
                        mode: {
                            type: 'standard',
                            useAuthentik: false
                        }
                    })
                });

                const result = await response.json();
                
                if (response.ok) {
                    resultDiv.innerHTML = `<span class="success">Deployment initiated!</span>\n${JSON.stringify(result, null, 2)}`;
                } else {
                    resultDiv.innerHTML = `<span class="error">Deployment failed!</span>\n${JSON.stringify(result, null, 2)}`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">Error:</span> ${error.message}`;
            }
        }
    </script>
</body>
</html>
