<!DOCTYPE html>
<html>
<head>
    <title>Test Deployment</title>
</head>
<body>
    <h1>Test HomelabARR Deployment</h1>
    <button onclick="testDeploy()">Test Deploy AMD App</button>
    <pre id="result"></pre>

    <script>
        async function testDeploy() {
            const resultDiv = document.getElementById('result');
            resultDiv.textContent = 'Testing deployment...';

            try {
                const response = await fetch('http://localhost:35002/deploy', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        appId: 'local-mode-apps-amd',
                        config: {
                            domain: 'localhost',
                            port: '8201'
                        },
                        mode: {
                            type: 'standard',
                            useAuthentik: false
                        }
                    })
                });

                const result = await response.json();
                resultDiv.textContent = JSON.stringify(result, null, 2);
                
                if (!response.ok) {
                    console.error('Deployment failed:', result);
                } else {
                    console.log('Deployment successful:', result);
                }
            } catch (error) {
                resultDiv.textContent = 'Error: ' + error.message;
                console.error('Deployment error:', error);
            }
        }
    </script>
</body>
</html>
