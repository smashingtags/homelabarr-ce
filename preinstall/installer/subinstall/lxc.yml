#!/usr/bin/env ansible-playbook
#
# Title:      LXC Bypass the mount :shared
# OS Branch:  ubuntu,debian,rasbian
# Author(s):  HomelabARR CLI Team
---
- hosts: localhost
  gather_facts: false
  name: LXC Playbook
  tasks:
    - cron:
        name: LXC Bypass the mount :shared
        special_time: 'reboot'
        user: root
        job: '/bin/bash /home/.lxcstart.sh 1>/dev/null 2>&1'
        state: present
      become_user: root
      ignore_errors: yes
