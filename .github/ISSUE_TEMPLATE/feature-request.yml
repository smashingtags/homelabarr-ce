name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What's frustrating or missing right now?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dashboard UI
        - App Templates
        - Docker Integration
        - Traefik / Networking
        - Dark Mode
        - Search / Filtering
        - Deployment
        - Documentation
        - Other
