name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      value: |
        1. Go to...
        2. Click on...
        3. See error...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: HomelabARR CE version
      placeholder: "e.g. v2.0.1 or dev branch"
    validations:
      required: true
  - type: input
    id: docker
    attributes:
      label: Docker version
      placeholder: "e.g. Docker 27.5.1"
  - type: input
    id: os
    attributes:
      label: Host OS
      placeholder: "e.g. Ubuntu 24.04, Unraid 7.0, Proxmox 8.3"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots
  - type: dropdown
    id: environment
    attributes:
      label: Which environment?
      options:
        - ce-demo (production)
        - ce-staging (staging)
        - ce-dev (development)
        - Self-hosted
