name: Build and Push Docker Containers

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'containers/**'
      - '.github/workflows/build-containers.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'containers/**'
  workflow_dispatch:
    inputs:
      container:
        description: 'Container to build (all, healthcheck, mount, qbittorrent, tautulli, nzbget, sabnzbd)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - healthcheck
          - mount
          - qbittorrent
          - tautulli
          - nzbget
          - sabnzbd

env:
  REGISTRY: ghcr.io
  NAMESPACE: smashingtags

jobs:
  build-matrix:
    runs-on: self-hosted
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build matrix
        id: set-matrix
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CONTAINER="${{ github.event.inputs.container }}"
          else
            CONTAINER="all"
          fi
          
          if [[ "$CONTAINER" == "all" ]]; then
            MATRIX='["healthcheck","mount","qbittorrent","tautulli","nzbget","sabnzbd"]'
          else
            MATRIX='["'$CONTAINER'"]'
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Building containers: $MATRIX"

  build-containers:
    needs: build-matrix
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        container: ${{ fromJson(needs.build-matrix.outputs.matrix) }}
    
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        continue-on-error: true
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set container metadata
        id: meta
        run: |
          case "${{ matrix.container }}" in
            "healthcheck")
              echo "image_name=homelabarr-mod-healthcheck" >> $GITHUB_OUTPUT
              echo "description=Health check Docker mod for LinuxServer containers" >> $GITHUB_OUTPUT
              ;;
            "mount")
              echo "image_name=docker-mount" >> $GITHUB_OUTPUT
              echo "description=Docker container for mounting cloud storage" >> $GITHUB_OUTPUT
              ;;
            "qbittorrent")
              echo "image_name=homelabarr-mod-qbittorrent" >> $GITHUB_OUTPUT
              echo "description=qBittorrent Docker mod for enhanced functionality" >> $GITHUB_OUTPUT
              ;;
            "tautulli")
              echo "image_name=homelabarr-mod-tautulli" >> $GITHUB_OUTPUT
              echo "description=Tautulli Docker mod for enhanced functionality" >> $GITHUB_OUTPUT
              ;;
            "nzbget")
              echo "image_name=homelabarr-mod-nzbget" >> $GITHUB_OUTPUT
              echo "description=NZBGet Docker mod for enhanced functionality" >> $GITHUB_OUTPUT
              ;;
            "sabnzbd")
              echo "image_name=homelabarr-mod-sabnzbd" >> $GITHUB_OUTPUT
              echo "description=SABnzbd Docker mod for enhanced functionality" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Extract metadata (tags, labels)
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.meta.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=v1.0.0,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ steps.meta.outputs.image_name }}
            org.opencontainers.image.description=${{ steps.meta.outputs.description }}
            org.opencontainers.image.vendor=HomelabARR CLI
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./containers/${{ matrix.container }}
          file: ./containers/${{ matrix.container }}/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ steps.meta.outputs.image_name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  update-docs:
    needs: [build-matrix, build-containers]
    runs-on: self-hosted
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Update container documentation
        run: |
          echo "# Container Registry" > CONTAINERS.md
          echo "" >> CONTAINERS.md
          echo "HomelabARR CLI containers are hosted on GitHub Container Registry under the \`smashingtags\` organization." >> CONTAINERS.md
          echo "" >> CONTAINERS.md
          echo "## Available Containers" >> CONTAINERS.md
          echo "" >> CONTAINERS.md
          echo "| Container | Registry | Latest Tag | Description |" >> CONTAINERS.md
          echo "|-----------|----------|------------|-------------|" >> CONTAINERS.md
          echo "| homelabarr-mod-healthcheck | ghcr.io/smashingtags/homelabarr-mod-healthcheck | v1.0.0 | Health check Docker mod |" >> CONTAINERS.md
          echo "| docker-mount | ghcr.io/smashingtags/docker-mount | latest | Cloud storage mounting |" >> CONTAINERS.md
          echo "| homelabarr-mod-qbittorrent | ghcr.io/smashingtags/homelabarr-mod-qbittorrent | v1.0.0 | qBittorrent enhancements |" >> CONTAINERS.md
          echo "| homelabarr-mod-tautulli | ghcr.io/smashingtags/homelabarr-mod-tautulli | v1.0.0 | Tautulli enhancements |" >> CONTAINERS.md
          echo "| homelabarr-mod-nzbget | ghcr.io/smashingtags/homelabarr-mod-nzbget | v1.0.0 | NZBGet enhancements |" >> CONTAINERS.md
          echo "| homelabarr-mod-sabnzbd | ghcr.io/smashingtags/homelabarr-mod-sabnzbd | v1.0.0 | SABnzbd enhancements |" >> CONTAINERS.md

      - name: Commit documentation updates
        if: github.event_name == 'push'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add CONTAINERS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update container registry documentation [skip ci]"
            git push
          fi