name: E2E Tests

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  e2e:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: dev
            url: https://ce-dev.homelabarr.com
          - name: staging
            url: https://ce-staging.homelabarr.com

    name: E2E (${{ matrix.target.name }})
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          TEST_BASE_URL: ${{ matrix.target.url }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.target.name }}
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots-${{ matrix.target.name }}
          path: test-results/
          retention-days: 14
