name: E2E Tests

on:
  # Only runs AFTER the Docker build completes successfully
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types: [completed]
    branches: [dev, staging]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  wait-for-watchtower:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Wait for Watchtower to pull new images
        run: |
          echo "Build completed. Waiting 10 minutes for Watchtower to pull and deploy..."
          sleep 600

      - name: Verify dev is reachable
        run: |
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf -o /dev/null -w '%{http_code}' https://ce-dev.homelabarr.com/ --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "ce-dev.homelabarr.com: 200 OK"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 30s..."
            sleep 30
          done
          echo "ce-dev.homelabarr.com not reachable after 5 attempts"
          exit 1

  setup:
    needs: wait-for-watchtower
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Cache Playwright browsers
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

  test:
    needs: setup
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - name: dev
            url: https://ce-dev.homelabarr.com
          - name: staging
            url: https://ce-staging.homelabarr.com
        suite:
          - name: catalog
            file: tests/e2e/catalog.spec.ts
          - name: modals
            file: tests/e2e/modals.spec.ts
          - name: icons
            file: tests/e2e/icons.spec.ts
          - name: dark-mode
            file: tests/e2e/dark-mode.spec.ts
          - name: footer
            file: tests/e2e/footer.spec.ts
          - name: monitoring
            file: tests/e2e/monitoring.spec.ts

    name: ${{ matrix.suite.name }} (${{ matrix.target.name }})
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch || github.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore Playwright browsers
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers (if cache miss)
        run: npx playwright install --with-deps chromium

      - name: Run ${{ matrix.suite.name }} tests
        run: npx playwright test ${{ matrix.suite.file }} --project=chromium
        env:
          TEST_BASE_URL: ${{ matrix.target.url }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: report-${{ matrix.target.name }}-${{ matrix.suite.name }}
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: screenshots-${{ matrix.target.name }}-${{ matrix.suite.name }}
          path: test-results/
          retention-days: 14
