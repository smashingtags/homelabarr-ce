name: Generate changelog
on:
  release:
    types: [ created ]
jobs:
  changelog-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
    - uses: actions/checkout@v5.0.0
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build Changelog
      id: github_release
      uses: mikepenz/release-changelog-builder-action@v4
      with:
        configuration: ".github/changelog-config.json"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Update Wiki Changelog
      run: |
        mkdir -p wiki/docs/install
        echo "# HomelabARR CE Changelog" > wiki/docs/install/changelog.md
        echo "" >> wiki/docs/install/changelog.md
        echo "This file is automatically generated from GitHub releases." >> wiki/docs/install/changelog.md
        echo "" >> wiki/docs/install/changelog.md
        echo "${{ steps.github_release.outputs.changelog }}" >> wiki/docs/install/changelog.md
        
    - name: Commit Changelog
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git checkout main
        git add wiki/docs/install/changelog.md
        git diff --staged --quiet || git commit -m "docs(CHANGELOG): update release notes for ${{ github.event.release.tag_name }}"
        git push origin HEAD:main
