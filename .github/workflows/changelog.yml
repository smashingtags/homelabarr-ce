name: Generate changelog
on:
  release:
    types: [ created ]
jobs:
  changelog-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Changelog
      id: github_release
      uses: mikepenz/release-changelog-builder-action@v6
      with:
        configuration: ".github/changelog-config.json"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Wiki Changelog
      run: |
        mkdir -p wiki/docs/install
        echo "# HomelabARR CE Changelog" > wiki/docs/install/changelog.md
        echo "" >> wiki/docs/install/changelog.md
        echo "This file is automatically generated from GitHub releases." >> wiki/docs/install/changelog.md
        echo "" >> wiki/docs/install/changelog.md
        echo "${{ steps.github_release.outputs.changelog }}" >> wiki/docs/install/changelog.md

    - name: Create PR with changelog
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        BRANCH="chore/changelog-${{ github.event.release.tag_name }}"
        git checkout -b "$BRANCH"
        git add wiki/docs/install/changelog.md
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git commit -m "docs(CHANGELOG): update release notes for ${{ github.event.release.tag_name }}"
        git push origin "$BRANCH"
        gh pr create \
          --title "docs: changelog for ${{ github.event.release.tag_name }}" \
          --body "Auto-generated changelog update for release ${{ github.event.release.tag_name }}" \
          --base main \
          --head "$BRANCH"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
