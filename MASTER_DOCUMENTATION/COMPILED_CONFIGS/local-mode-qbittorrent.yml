---
services:
  qbittorrent:
    hostname: "qbittorrent"
    container_name: "qbittorrent"
    environment:
      - "PGID=1000"
      - "PUID=1000"
      - "TZ=America/New_York"
      - "UMASK=002"
      - "WEBUI_PORT=8080"
      - "DOCKER_MODS=ghcr.io/themepark-dev/theme.park:qbittorrent|ghcr.io/smashingtags/homelabarr-mod-qbittorrent:v1.0.0"
      - "TP_THEME=dark"
    image: "linuxserver/qbittorrent:latest"
    restart: "unless-stopped"
    # LOCAL MODE: Uses bridge network for direct access
    networks:
      - bridge
    security_opt:
      - "no-new-privileges:true"
    # LOCAL MODE: Web UI and torrent ports exposed for direct access
    ports:
      - "8080:8080"     # Web UI
      - "6881:6881"     # Torrent port TCP
      - "6881:6881/udp" # Torrent port UDP
    volumes:
      - "/opt/appdata/qbittorrent:/config:rw"
      - "unionfs:/mnt"
    # LOCAL MODE: No Traefik labels, only maintenance labels
    labels:
      - "dockupdater.enable=true"

      # HomelabARR CLI - Traefik Configuration
      - "traefik.enable=true"
      - "traefik.http.routers.local-mode-qbittorrent.entrypoints=websecure"
      - "traefik.http.routers.local-mode-qbittorrent.rule=Host(`local-mode-qbittorrent.${DOMAIN}`)"
      - "traefik.http.routers.local-mode-qbittorrent.tls=true"
      - "traefik.http.routers.local-mode-qbittorrent.tls.certresolver=cfdns"
      - "traefik.http.routers.local-mode-qbittorrent.middlewares=authelia@docker"
      - "traefik.http.services.local-mode-qbittorrent.loadbalancer.server.port=${LOCAL-MODE-QBITTORRENT_PORT}"
# LOCAL MODE: Uses default bridge network
networks:
  bridge:
    driver: bridge

volumes:
  unionfs:
    driver: local-persist
    driver_opts:
      mountpoint: /mnt

# LOCAL MODE ACCESS INFORMATION:
# - Web Interface: http://192.168.1.100:8080
# - Default credentials: admin/adminadmin (change on first login)
# - No external authentication required
# - Direct peer connection on port 6881
# - All qBittorrent features available
