---
services:
  tautulli:
    hostname: "tautulli"
    container_name: "tautulli"
    environment:
      - "PGID=${ID}"
      - "PUID=${ID}"
      - "TZ=${TZ}"
      - "UMASK=${UMASK}"
      - "DOCKER_MODS=ghcr.io/themepark-dev/theme.park:tautulli"
      - "TP_THEME=${TAUTULLITHEME}"
    image: "${TAUTULLIIMAGE}"
    restart: "${RESTARTAPP}"
    ports:
      - "8181:8181"
    networks:
      - homelabarr-cli-local
    security_opt:
      - "${SECURITYOPS}:${SECURITYOPSSET}"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "${APPFOLDER}/tautulli:/config:rw"
    labels:
      - "dockupdater.enable=true"

      # HomelabARR CLI - Traefik Configuration
      - "traefik.enable=true"
      - "traefik.http.routers.tautulli-local-template.entrypoints=websecure"
      - "traefik.http.routers.tautulli-local-template.rule=Host(`tautulli-local-template.${DOMAIN}`)"
      - "traefik.http.routers.tautulli-local-template.tls=true"
      - "traefik.http.routers.tautulli-local-template.tls.certresolver=cfdns"
      - "traefik.http.routers.tautulli-local-template.middlewares=authelia@docker"
      - "traefik.http.services.tautulli-local-template.loadbalancer.server.port=${TAUTULLI-LOCAL-TEMPLATE_PORT}"
networks:
  homelabarr-cli-local:
    driver: bridge

volumes:
  unionfs:
    driver: local
