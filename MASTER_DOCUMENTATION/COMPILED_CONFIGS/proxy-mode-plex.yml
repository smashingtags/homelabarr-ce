---
services:
  plex:
    hostname: "plex"
    container_name: "plex"
    environment:
      - "PGID=1000"
      - "PUID=1000"
      - "TZ=America/New_York"
      - "UMASK=002"
      - "PLEX_CLAIM=PLEX_CLAIM_ID"
      - "VERSION=docker"
      # PROXY MODE: Domain-based access via Traefik
      - "ADVERTISE_IP=http://plex.example.com:443"
      - "DOCKER_MODS=ghcr.io/themepark-dev/theme.park:plex|ghcr.io/smashingtags/homelabarr-mod-healthcheck:v1.0.0"
      - "TP_THEME=dark"
      - "TP_ADDON=none"
    image: "linuxserver/plex:latest"
    restart: "unless-stopped"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:32400/identity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # PROXY MODE: Uses external proxy network
    networks:
      - proxy
    security_opt:
      - "no-new-privileges:true"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    extra_hosts:
      - "analytics.plex.tv:127.0.0.1"
      - "metrics.plex.tv:127.0.0.1"
      - "metric.plex.tv:127.0.0.1"
      - "mf.svc.nhl.com:127.0.0.1"
      - "mlb-ws-mf.media.mlb.com:127.0.0.1"
      - "playback.svcs.mlb.com:127.0.0.1"
    # PROXY MODE: Only internal port, Traefik handles external routing
    ports:
      - "32400:32400/tcp"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "/opt/appdata/plex/database:/config:rw"
      - "unionfs:/mnt:ro"
      - "/dev/shm:/ram_transcode:rw"
    # PROXY MODE: Traefik labels for reverse proxy routing
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "dockupdater.enable=true"
      - "traefik.http.routers.plex-rtr.entrypoints=https"
      - "traefik.http.routers.plex-rtr.rule=Host(`plex.example.com`)"
      - "traefik.http.routers.plex-rtr.tls=true"
      - "traefik.http.routers.plex-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.plex-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.plex-rtr.service=plex-svc"
      - "traefik.http.services.plex-svc.loadbalancer.server.scheme=https"
      - "traefik.http.services.plex-svc.loadbalancer.server.port=32400"

# PROXY MODE: External proxy network for Traefik communication
networks:
  proxy:
    driver: bridge
    external: true

volumes:
  unionfs:
    driver: local-persist
    driver_opts:
      mountpoint: /mnt

# PROXY MODE ACCESS INFORMATION:
# - Web Interface: https://plex.example.com
# - Automatic SSL via Let's Encrypt
# - Authelia authentication required
# - Domain must be configured in DNS
