# Project information
site_name: HomelabARR Wiki
use_directory_urls: true
site_url: "https://wiki.homelabarr.com"
site_author: HomelabARR CE
site_description: Documentation for HomelabARR Community Edition — free, open-source Docker container management

# Repository
repo_name: HomelabARR Wiki
repo_url: https://github.com/smashingtags/homelabarr-ce
edit_uri: https://github.com/smashingtags/homelabarr-ce/edit/main/wiki/docs/
copyright: Copyright &copy; 2026 Imogen Labs

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highligh
    - search.share
    - navigation.top
    - toc.integrate
  language: en
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode

  # Static files
  static_templates:
    - 404.html
  include_search_page: false
  search_index_only: true
  icon:
    admonition:
      note: material/note
      abstract: material/book
      info: material/information
      tip: material/bullhorn
      success: material/check
      question: material/help-circle
      warning: material/alert
      failure: material/close-circle
      danger: material/alert-octagon
      bug: material/bug
      example: material/beaker
      quote: material/format-quote-close

  font:
    text: Roboto
    code: Roboto Mono
  favicon: img/favicon.png
  logo: img/homelabarr-banner.jpg

# Plugins
plugins:
  - search:
      lang: en
  # - meta
  - redirects:
      redirect_maps:
        404.html: index.md
  - minify:
      minify_html: true

# Customization
extra:
  analytics:
    provider: google
    property: 'G-00QEDJW2TS'
  social:
    - icon: fontawesome/solid/heart
      class: md-social__link heart
      name: Donate
    - icon: fontawesome/brands/github
      class: md-social__link
      link: https://github.com/smashingtags/homelabarr-ce
      name: GitHub
    - icon: fontawesome/brands/docker
      link: https://github.com/orgs/smashingtags/packages/
    - icon: fontawesome/brands/discord
      class: md-social__link
      link: https://discord.gg/Pc7mXX786x
      name: Discord
    - icon: fontawesome/brands/firefox
      link: https://github.com/smashingtags/homelabarr-ce

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

