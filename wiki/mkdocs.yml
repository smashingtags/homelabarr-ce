# HomelabARR CE Wiki
site_name: HomelabARR Wiki
use_directory_urls: true
site_url: "https://wiki.homelabarr.com"
site_author: HomelabARR CE
site_description: Documentation for HomelabARR Community Edition — free, open-source Docker container management

# Repository
repo_name: HomelabARR CE
repo_url: https://github.com/smashingtags/homelabarr-ce
edit_uri: https://github.com/smashingtags/homelabarr-ce/edit/main/wiki/docs/
copyright: Copyright &copy; 2026 Imogen Labs

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - navigation.top
    - toc.integrate
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: teal
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  icon:
    admonition:
      note: material/note
      tip: material/bullhorn
      warning: material/alert
      info: material/information
  font:
    text: Roboto
    code: Roboto Mono
  favicon: img/favicon.png
  logo: img/homelabarr-banner.jpg

# Plugins
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

# Customization
extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://homelabarr.com
      name: HomelabARR
    - icon: fontawesome/brands/github
      link: https://github.com/smashingtags/homelabarr-ce
      name: GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/Pc7mXX786x
      name: Discord
    - icon: fontawesome/solid/building
      link: https://imogenlabs.ai
      name: Imogen Labs
    - icon: fontawesome/solid/user
      link: https://mjashley.com
      name: Michael Ashley

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Page tree
nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: guides/quick-start.md
      - Web Dashboard: guides/web-dashboard.md
      - Configuration: guides/configuration.md
  - Guides:
      - Traefik & Domain Setup: guides/traefik-setup.md
      - CLI Installation: guides/cli-installation.md
      - API Reference: guides/api-reference.md
  - Developer:
      - Architecture: guides/architecture.md
      - CLI Bridge: guides/cli-bridge.md
      - Contributing: guides/contributing.md
  - Professional Edition:
      - Overview: pe/overview.md
  - Community:
      - FAQ & Troubleshooting: guides/faq.md
      - Discord: https://discord.gg/Pc7mXX786x
      - GitHub Discussions: https://github.com/smashingtags/homelabarr-ce/discussions
