services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    environment:
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=UTC
    ports:
      - "5678:5678"
    volumes:
      - ./data:/home/node/.n8n
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
