services:
  archivebox:
    image: archivebox/archivebox:latest
    container_name: archivebox
    restart: unless-stopped
    environment:
      - ALLOWED_HOSTS=*
      - MEDIA_MAX_SIZE=750m
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    networks:
      - proxy

networks:
  proxy:
    driver: bridge
