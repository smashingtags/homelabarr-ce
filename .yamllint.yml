# yamllint configuration for HomelabARR CLI
# Optimized for Docker Compose files and general YAML

extends: default

rules:
  # Line length - Docker Compose can have long lines
  line-length:
    max: 120
    level: warning

  # Indentation - Standard 2 spaces
  indentation:
    spaces: 2
    indent-sequences: true
    check-multi-line-strings: false

  # Comments - Allow comments without space after #
  comments:
    min-spaces-from-content: 1

  # Document start - Don't require --- at beginning
  document-start:
    present: false

  # Trailing spaces - Remove them
  trailing-spaces: enable

  # Empty lines
  empty-lines:
    max: 2
    max-start: 0
    max-end: 1

  # Brackets - Allow both styles
  brackets:
    min-spaces-inside: 0
    max-spaces-inside: 1

  # Braces - Allow both styles  
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

  # Truthy values - Allow yes/no, true/false, on/off
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no', 'on', 'off']
    check-keys: false

  # Quoted strings - Be flexible with Docker Compose
  quoted-strings:
    quote-type: any
    required: false

  # Float values - Allow Docker notation
  float-values:
    require-numeral-before-decimal: false

ignore: |
  # Generated or external files
  homelabarr-ce-wiki/
  .git/
  .claude/backups/
  
  # Test and backup files
  *test*.yml
  *.backup
  *.backup_*
  *.repo_backup
  
  # Specific files that may have formatting issues
  .github/
