# Run GPT4All models locally — privacy-focused AI chat with no cloud dependency
# GPU Required | HomelabARR AI Category

services:
  gpt4all:
    hostname: "gpt4all"
    container_name: "gpt4all"
    environment:
      - "TZ=${TZ}"
      - "NVIDIA_VISIBLE_DEVICES=all"
    image: "nomic-ai/gpt4all:latest"
    restart: "${RESTARTAPP}"
    networks:
      - ${DOCKERNETWORK}
    security_opt:
      - "${SECURITYOPS}:${SECURITYOPSSET}"
    ports:
      - "4891:4891"
    volumes:
      - "${APPFOLDER}/gpt4all:/home/gpt4all/.local/share/nomic.ai:rw"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "x-gpu=true"
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.gpt4all-rtr.entrypoints=https"
      - "traefik.http.routers.gpt4all-rtr.rule=Host(`gpt4all.${DOMAIN}`)"
      - "traefik.http.routers.gpt4all-rtr.tls=true"
      - "traefik.http.routers.gpt4all-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.gpt4all-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.gpt4all-rtr.service=gpt4all-svc"
      - "traefik.http.services.gpt4all-svc.loadbalancer.server.port=4891"
networks:
  proxy:
    driver: bridge
    external: true
