# Desktop-first local AI assistant — run LLMs offline with a clean UI
# GPU Required | HomelabARR AI Category

services:
  jan:
    hostname: "jan"
    container_name: "jan"
    environment:
      - "TZ=${TZ}"
      - "NVIDIA_VISIBLE_DEVICES=all"
    image: "ghcr.io/janhq/jan:latest"
    restart: "${RESTARTAPP}"
    networks:
      - ${DOCKERNETWORK}
    security_opt:
      - "${SECURITYOPS}:${SECURITYOPSSET}"
    ports:
      - "1337:1337"
    volumes:
      - "${APPFOLDER}/jan:/app/jan:rw"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.jan-rtr.entrypoints=https"
      - "traefik.http.routers.jan-rtr.rule=Host(`jan.${DOMAIN}`)"
      - "traefik.http.routers.jan-rtr.tls=true"
      - "traefik.http.routers.jan-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.jan-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.jan-rtr.service=jan-svc"
      - "traefik.http.services.jan-svc.loadbalancer.server.port=1337"
networks:
  proxy:
    driver: bridge
    external: true
