# Ollama - Run large language models locally
# Supports Llama, Mistral, Gemma, Phi, and hundreds of open-source models
# GPU acceleration with NVIDIA CUDA for fast inference

services:
  ollama:
    hostname: ollama
    container_name: ollama
    environment:
      - "TZ=${TZ}"
      - "OLLAMA_HOST=0.0.0.0"
      - "OLLAMA_ORIGINS=*"
      - "NVIDIA_VISIBLE_DEVICES=all"
    image: "ollama/ollama:latest"
    restart: "${RESTARTAPP}"
    networks:
      - ${DOCKERNETWORK}
    security_opt:
      - "${SECURITYOPS}:${SECURITYOPSSET}"
    ports:
      - "11434:11434"
    volumes:
      - "${APPFOLDER}/ollama:/root/.ollama:rw"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    labels:
      - "x-gpu=true"
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.ollama-rtr.entrypoints=https"
      - "traefik.http.routers.ollama-rtr.rule=Host(`ollama.${DOMAIN}`)"
      - "traefik.http.routers.ollama-rtr.tls=true"
      - "traefik.http.routers.ollama-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.ollama-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.ollama-rtr.service=ollama-svc"
      - "traefik.http.services.ollama-svc.loadbalancer.server.port=11434"
networks:
  proxy:
    driver: bridge
    external: true
