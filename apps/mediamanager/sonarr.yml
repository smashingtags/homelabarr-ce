---
services:
  sonarr:
    hostname: "sonarr"
    container_name: "sonarr"
    environment:
      - "PGID=${ID}"
      - "PUID=${ID}"
      - "TZ=${TZ}"
      - "UMASK=${UMASK}"
      - "DOCKER_MODS=ghcr.io/themepark-dev/theme.park:sonarr|ghcr.io/smashingtags/homelabarr-mod-healthcheck:v1.0.0"
      - "TP_THEME=${SONARRTHEME}"
      - "TP_ADDON=sonarr-text-logo"
    image: "${SONARRIMAGE}"
    restart: "${RESTARTAPP}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8989/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    networks:
      - ${DOCKERNETWORK}
    security_opt:
      - "${SECURITYOPS}:${SECURITYOPSSET}"
    volumes:
      - "${APPFOLDER}/sonarr:/config:rw"
      - "unionfs:/mnt"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "dockupdater.enable=true"
      - "traefik.http.routers.sonarr-rtr.entrypoints=https"
      - "traefik.http.routers.sonarr-rtr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr-rtr.tls=true"
      - "traefik.http.routers.sonarr-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.sonarr-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.sonarr-rtr.service=sonarr-svc"
      - "traefik.http.services.sonarr-svc.loadbalancer.server.port=8989"
networks:
  proxy:
    driver: bridge
    external: true
volumes:
  unionfs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt
