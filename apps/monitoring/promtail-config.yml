# Promtail configuration for HomelabARR CLI
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # System logs
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlogs
          __path__: /var/log/*log
          host: homelabarr-cli

  # Docker container logs
  - job_name: containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Add container name as label
      - source_labels: ['__meta_docker_container_name']
        target_label: 'container'
      # Add container image as label
      - source_labels: ['__meta_docker_container_image']
        target_label: 'image'
      # Add compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
      # Add monitoring labels if present
      - source_labels: ['__meta_docker_container_label_monitoring_service']
        target_label: 'service'
      - source_labels: ['__meta_docker_container_label_monitoring_type']
        target_label: 'type'
      # Set log path
      - source_labels: ['__meta_docker_container_id']
        target_label: '__path__'
        replacement: '/var/lib/docker/containers/$1/*.log'

  # Traefik access logs
  - job_name: traefik
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          service: traefik
          type: access-log
          __path__: /mnt/appdata/traefik/logs/access.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level
            msg: msg
            method: RequestMethod
            url: RequestPath
            status: DownstreamStatus
            duration: Duration
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          method:
          status:

  # Traefik error logs
  - job_name: traefik-error
    static_configs:
      - targets:
          - localhost
        labels:
          job: traefik
          service: traefik
          type: error-log
          __path__: /mnt/appdata/traefik/logs/traefik.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level
            msg: msg
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:

  # Authelia logs
  - job_name: authelia
    static_configs:
      - targets:
          - localhost
        labels:
          job: authelia
          service: authelia
          __path__: /mnt/appdata/authelia/authelia.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: time
            level: level
            msg: msg
            method: method
            path: path
            status: status_code
      - timestamp:
          source: timestamp
          format: RFC3339Nano
      - labels:
          level:
          method:
          status:

  # Plex Media Server logs
  - job_name: plex
    static_configs:
      - targets:
          - localhost
        labels:
          job: plex
          service: plex
          __path__: /mnt/appdata/plex/Library/Application Support/Plex Media Server/Logs/*.log

  # Sonarr logs
  - job_name: sonarr
    static_configs:
      - targets:
          - localhost
        labels:
          job: sonarr
          service: sonarr
          __path__: /mnt/appdata/sonarr/logs/*.txt

  # Radarr logs
  - job_name: radarr
    static_configs:
      - targets:
          - localhost
        labels:
          job: radarr
          service: radarr
          __path__: /mnt/appdata/radarr/logs/*.txt

  # qBittorrent logs
  - job_name: qbittorrent
    static_configs:
      - targets:
          - localhost
        labels:
          job: qbittorrent
          service: qbittorrent
          __path__: /mnt/appdata/qbittorrent/data/logs/*.log

  # Generic application logs
  - job_name: applications
    static_configs:
      - targets:
          - localhost
        labels:
          job: applications
          __path__: /mnt/appdata/*/logs/*.log
    pipeline_stages:
      - regex:
          expression: '/mnt/appdata/(?P<app>[^/]+)/logs/.*'
      - labels:
          app:
