services:
  # Prometheus - Metrics collection
  prometheus:
    hostname: "prometheus"
    container_name: "prometheus"
    image: "prom/prometheus:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.3'
    
    # Command configuration
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--storage.tsdb.retention.size=10GB'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--web.external-url=https://prometheus.${DOMAIN}'
      - '--web.route-prefix=/'
    
    # Storage and configuration
    volumes:
      - "${APPFOLDER}/prometheus/config:/etc/prometheus:ro"
      - "${APPFOLDER}/prometheus/data:/prometheus:rw"
      - "/etc/localtime:/etc/localtime:ro"
    
    # User management
    user: "${ID}:${ID}"
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Traefik integration
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.prometheus-rtr.entrypoints=https"
      - "traefik.http.routers.prometheus-rtr.rule=Host(`prometheus.${DOMAIN}`)"
      - "traefik.http.routers.prometheus-rtr.tls=true"
      - "traefik.http.routers.prometheus-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.prometheus-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.prometheus-rtr.service=prometheus-svc"
      - "traefik.http.services.prometheus-svc.loadbalancer.server.port=9090"
      
      # Monitoring metadata
      - "monitoring.enable=true"
      - "monitoring.type=metrics"
      - "monitoring.service=prometheus"

  # Grafana - Visualization platform
  grafana:
    hostname: "grafana"
    container_name: "grafana"
    image: "grafana/grafana:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    
    # User management
    user: "${ID}:${ID}"
    
    # Persistent storage
    volumes:
      - "${APPFOLDER}/grafana/data:/var/lib/grafana:rw"
      - "${APPFOLDER}/grafana/provisioning:/etc/grafana/provisioning:ro"
      - "${APPFOLDER}/grafana/dashboards:/var/lib/grafana/dashboards:ro"
      - "/etc/localtime:/etc/localtime:ro"
    
    # Configuration environment
    environment:
      - "GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}"
      - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}"
      - "GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource,grafana-worldmap-panel,grafana-piechart-panel,redis-datasource,grafana-polystat-panel"
      - "GF_SERVER_DOMAIN=grafana.${DOMAIN}"
      - "GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}"
      - "GF_SECURITY_COOKIE_SECURE=true"
      - "GF_SECURITY_COOKIE_SAMESITE=lax"
      - "GF_AUTH_DISABLE_LOGIN_FORM=false"
      - "GF_AUTH_DISABLE_SIGNOUT_MENU=false"
      - "GF_ANALYTICS_REPORTING_ENABLED=false"
      - "GF_ANALYTICS_CHECK_FOR_UPDATES=false"
      - "GF_SECURITY_DISABLE_GRAVATAR=true"
      - "GF_SNAPSHOTS_EXTERNAL_ENABLED=false"
      - "GF_SMTP_ENABLED=true"
      - "GF_SMTP_HOST=${SMTP_HOST}:587"
      - "GF_SMTP_USER=${SMTP_USERNAME}"
      - "GF_SMTP_PASSWORD=${SMTP_PASSWORD}"
      - "GF_SMTP_FROM_ADDRESS=grafana@${DOMAIN}"
      - "GF_LOG_LEVEL=warn"
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Traefik integration
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.grafana-rtr.entrypoints=https"
      - "traefik.http.routers.grafana-rtr.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana-rtr.tls=true"
      - "traefik.http.routers.grafana-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.grafana-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.grafana-rtr.service=grafana-svc"
      - "traefik.http.services.grafana-svc.loadbalancer.server.port=3000"
      
      # Monitoring metadata
      - "monitoring.enable=true"
      - "monitoring.type=visualization"
      - "monitoring.service=grafana"

  # Loki - Log aggregation system
  loki:
    hostname: "loki"
    container_name: "loki"
    image: "grafana/loki:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.2'
    
    # Command configuration
    command: -config.file=/etc/loki/local-config.yaml
    
    # Storage and configuration
    volumes:
      - "${APPFOLDER}/loki/config:/etc/loki:ro"
      - "${APPFOLDER}/loki/data:/loki:rw"
      - "/etc/localtime:/etc/localtime:ro"
    
    # User management
    user: "${ID}:${ID}"
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Traefik integration
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.loki-rtr.entrypoints=https"
      - "traefik.http.routers.loki-rtr.rule=Host(`loki.${DOMAIN}`)"
      - "traefik.http.routers.loki-rtr.tls=true"
      - "traefik.http.routers.loki-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.loki-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.loki-rtr.service=loki-svc"
      - "traefik.http.services.loki-svc.loadbalancer.server.port=3100"
      
      # Monitoring metadata
      - "monitoring.enable=true"
      - "monitoring.type=logs"
      - "monitoring.service=loki"

  # Promtail - Log collection agent
  promtail:
    hostname: "promtail"
    container_name: "promtail"
    image: "grafana/promtail:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Command configuration
    command: -config.file=/etc/promtail/config.yml
    
    # Comprehensive log access
    volumes:
      - "${APPFOLDER}/promtail/config:/etc/promtail:ro"
      - "/var/log:/var/log:ro"
      - "/var/lib/docker/containers:/var/lib/docker/containers:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "${APPFOLDER:-/opt/appdata}:/mnt/appdata:ro"
      - "/etc/localtime:/etc/localtime:ro"
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Monitoring metadata
    labels:
      - "traefik.enable=false"
      - "monitoring.enable=true"
      - "monitoring.type=log-collector"
      - "monitoring.service=promtail"

  # cAdvisor - Container metrics
  cadvisor:
    hostname: "cadvisor"
    container_name: "cadvisor"
    image: "gcr.io/cadvisor/cadvisor:latest"
    restart: "unless-stopped"
    
    # Privileged access for container monitoring
    privileged: true
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # System access for monitoring
    volumes:
      - "/:/rootfs:ro"
      - "/var/run:/var/run:ro"
      - "/sys:/sys:ro"
      - "/var/lib/docker/:/var/lib/docker:ro"
      - "/dev/disk/:/dev/disk:ro"
      - "/etc/localtime:/etc/localtime:ro"
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Device access
    devices:
      - "/dev/kmsg:/dev/kmsg"
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Traefik integration
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.cadvisor-rtr.entrypoints=https"
      - "traefik.http.routers.cadvisor-rtr.rule=Host(`cadvisor.${DOMAIN}`)"
      - "traefik.http.routers.cadvisor-rtr.tls=true"
      - "traefik.http.routers.cadvisor-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.cadvisor-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.cadvisor-rtr.service=cadvisor-svc"
      - "traefik.http.services.cadvisor-svc.loadbalancer.server.port=8080"
      
      # Monitoring metadata
      - "monitoring.enable=true"
      - "monitoring.type=container-metrics"
      - "monitoring.service=cadvisor"

  # Node Exporter - System metrics
  node-exporter:
    hostname: "node-exporter"
    container_name: "node-exporter"
    image: "prom/node-exporter:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'
    
    # Command configuration
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.systemd'
      - '--collector.processes'
    
    # System access
    volumes:
      - "/proc:/host/proc:ro"
      - "/sys:/host/sys:ro"
      - "/:/rootfs:ro"
      - "/etc/localtime:/etc/localtime:ro"
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Monitoring metadata
    labels:
      - "traefik.enable=false"
      - "monitoring.enable=true"
      - "monitoring.type=system-metrics"
      - "monitoring.service=node-exporter"

  # Portainer - Docker management UI
  portainer:
    hostname: "portainer"
    container_name: "portainer"
    image: "portainer/portainer-ce:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'
    
    # Command configuration
    command: -H unix:///var/run/docker.sock
    
    # Persistent storage and Docker access
    volumes:
      - "${APPFOLDER}/portainer/data:/data:rw"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/etc/localtime:/etc/localtime:ro"
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Traefik integration
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.portainer-rtr.entrypoints=https"
      - "traefik.http.routers.portainer-rtr.rule=Host(`portainer.${DOMAIN}`)"
      - "traefik.http.routers.portainer-rtr.tls=true"
      - "traefik.http.routers.portainer-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.portainer-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.portainer-rtr.service=portainer-svc"
      - "traefik.http.services.portainer-svc.loadbalancer.server.port=9000"
      
      # Monitoring metadata
      - "monitoring.enable=true"
      - "monitoring.type=container-management"
      - "monitoring.service=portainer"

  # Dozzle - Real-time Docker log viewer
  dozzle:
    hostname: "dozzle"
    container_name: "dozzle"
    image: "amir20/dozzle:latest"
    restart: "unless-stopped"
    
    # Resource allocation
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'
    
    # Docker socket access for log reading
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "/etc/localtime:/etc/localtime:ro"
    
    # Environment configuration
    environment:
      - "DOZZLE_LEVEL=info"
      - "DOZZLE_TAILSIZE=300"
      - "DOZZLE_FILTER=status=running"
      - "DOZZLE_NO_ANALYTICS=true"
    
    # Security
    security_opt:
      - no-new-privileges:true
    
    # Network configuration
    networks:
      - ${DOCKERNETWORK}
    
    # Health check
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/logs"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    
    # Traefik integration
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.dozzle-rtr.entrypoints=https"
      - "traefik.http.routers.dozzle-rtr.rule=Host(`dozzle.${DOMAIN}`)"
      - "traefik.http.routers.dozzle-rtr.tls=true"
      - "traefik.http.routers.dozzle-rtr.tls.certresolver=dns-cloudflare"
      - "traefik.http.routers.dozzle-rtr.middlewares=chain-authelia@file"
      - "traefik.http.routers.dozzle-rtr.service=dozzle-svc"
      - "traefik.http.services.dozzle-svc.loadbalancer.server.port=8080"
      
      # Monitoring metadata
      - "monitoring.enable=true"
      - "monitoring.type=log-viewer"
      - "monitoring.service=dozzle"

networks:
  proxy:
    driver: bridge
    external: true
