---
## SET GLOBAL HEADER FOR COMPOSER
services:
  restic:
    container_name: "restic"
    hostname: "restic"
    environment:
      - "PGID=${ID}"
      - "PUID=${ID}"
      - "TZ=${TZ}"
    image: "ghcr.io/smashingtags/docker-restic:1.0.0"
    restart: "${RESTARTAPP}"
    networks:
      - ${DOCKERNETWORK}
    security_opt:
      - "apparmor:unconfined"
    volumes:
      - "${APPFOLDER}/restic:/config:rw"
      - "${APPFOLDER}:/opt/appdata:rw"
    labels:
      - "dockupdater.enable=true"
networks:
  proxy:
    driver: bridge
    external: true
