# HomelabARR Enhanced Mount Container - System/Traefik Installation
# Multi-provider cloud storage with cost tracking and modern web interface
# Enhanced version of homelabarr-mount with advanced features

services:
  mount-enhanced:
    image: ghcr.io/smashingtags/homelabarr-mount-enhanced:latest
    container_name: ${COMPOSE_PROJECT_NAME}_mount_enhanced
    hostname: mount-enhanced
    restart: unless-stopped
    
    # Required privileges for FUSE mounting
    privileged: true
    cap_add:
      - SYS_ADMIN
    devices:
      - "/dev/fuse:/dev/fuse"
    security_opt:
      - "apparmor:unconfined"
    
    # Environment configuration with Traefik integration
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
      
      # Enhanced features
      - ENHANCED_MODE=true
      - MULTI_PROVIDER=true
      - COST_TRACKING=true
      
      # Domain and security
      - DOMAIN=${DOMAIN}
      - CLOUDFLARE_EMAIL=${CLOUDFLARE_EMAIL}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY}
      
      # Provider settings (configurable via .env)
      - GDRIVE_ENABLED=${GDRIVE_ENABLED:-true}
      - BACKBLAZE_ENABLED=${BACKBLAZE_ENABLED:-false}
      - ONEDRIVE_ENABLED=${ONEDRIVE_ENABLED:-false}
      - PCLOUD_ENABLED=${PCLOUD_ENABLED:-false}
      
      # Performance settings
      - UPLOAD_CONCURRENCY=${UPLOAD_CONCURRENCY:-4}
      - VFS_CACHE_MODE=${VFS_CACHE_MODE:-writes}
      - VFS_CACHE_SIZE=${VFS_CACHE_SIZE:-100GB}
      - BUFFER_SIZE=${BUFFER_SIZE:-48M}
      
      # Cost management
      - COST_LIMIT_MONTHLY=${COST_LIMIT_MONTHLY:-50}
      - PROVIDER_SELECTION=${PROVIDER_SELECTION:-auto}
      - COST_ALERTS=${COST_ALERTS:-enabled}
      
      # Web interface
      - WEB_UI=enabled
      - WEB_PORT=8080
      
      # Monitoring
      - METRICS_ENABLED=true
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    # Volume configuration using named volumes
    volumes:
      # Core directories
      - mount_enhanced_config:/config
      - mount_enhanced_move:/move
      - mount_enhanced_unionfs:/unionfs:shared
      
      # Data and logs
      - mount_enhanced_data:/data
      - mount_enhanced_logs:/logs
      
      # Cache for performance
      - mount_enhanced_cache:/config/cache
      
      # System monitoring
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    
    # Traefik network
    networks:
      - proxy
    
    # Traefik labels for reverse proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      
      # HTTP router
      - "traefik.http.routers.mount-enhanced.rule=Host(`mount.${DOMAIN}`)"
      - "traefik.http.routers.mount-enhanced.entrypoints=websecure"
      - "traefik.http.routers.mount-enhanced.tls=true"
      - "traefik.http.routers.mount-enhanced.tls.certresolver=cloudflare"
      
      # Service configuration
      - "traefik.http.services.mount-enhanced.loadbalancer.server.port=8080"
      
      # Authelia authentication
      - "traefik.http.routers.mount-enhanced.middlewares=authelia@docker"
      
      # Homepage integration
      - "homepage.group=Storage"
      - "homepage.name=Cloud Mount Enhanced"
      - "homepage.icon=cloud-upload"
      - "homepage.href=https://mount.${DOMAIN}"
      - "homepage.description=Multi-provider cloud storage with cost tracking"
      - "homepage.weight=5"
      
      # Prometheus metrics
      - "prometheus.scrape=true"
      - "prometheus.port=9090"
      - "prometheus.path=/metrics"
      
      # Security headers
      - "traefik.http.routers.mount-enhanced.middlewares=authelia@docker,secure-headers@docker"
    
    # Health monitoring
    healthcheck:
      test: ["CMD", "/app/enhanced/health-check.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource management
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
          cpus: '0.5'

# Network configuration
networks:
  proxy:
    name: proxy
    external: true

# Named volumes with native bind mounts
volumes:
  mount_enhanced_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/mount-enhanced/config
  
  mount_enhanced_move:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MOVE}/move
  
  mount_enhanced_unionfs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UNIONFS}/unionfs
  
  mount_enhanced_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/mount-enhanced/data
  
  mount_enhanced_logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/mount-enhanced/logs
  
  mount_enhanced_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/mount-enhanced/cache