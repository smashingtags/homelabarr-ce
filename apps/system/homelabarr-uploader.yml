# HomelabARR Uploader Service - Automated Cloud Upload Management
# Handles automatic uploading of media files to cloud storage with multi-drive support
# Integrates with Rclone, Autoscan, and Mount services

services:
  homelabarr-uploader:
    image: ghcr.io/homelabarr/uploader:latest
    container_name: ${COMPOSE_PROJECT_NAME}_uploader
    hostname: homelabarr-uploader
    restart: unless-stopped
    
    # Environment configuration
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - UMASK=${UMASK}
      
      # Critical setup for encrypted drives
      - HASHPASSWORD=${UPLOADER_HASHPASSWORD:-hashed}
      - GDSA_NAME=${UPLOADER_GDSA_NAME:-encrypt}
      - DB_NAME=${UPLOADER_DB_NAME:-encrypt}
      - DB_TEAM=${UPLOADER_DB_TEAM:-true}
      
      # Rclone configuration
      - BANDWIDTH_LIMIT=${UPLOADER_BANDWIDTH_LIMIT:-null}
      - GOOGLE_IP=${UPLOADER_GOOGLE_IP:-142.250.74.78}
      - PROXY=${UPLOADER_PROXY:-null}
      - LOG_LEVEL=${UPLOADER_LOG_LEVEL:-INFO}
      - DLFOLDER=${DOWNLOADFOLDER:-/mnt/downloads}
      - TRANSFERS=${UPLOADER_TRANSFERS:-2}
      
      # Upload behavior settings
      - DRIVEUSEDSPACE=${UPLOADER_DRIVEUSEDSPACE:-null}
      - FOLDER_DEPTH=${UPLOADER_FOLDER_DEPTH:-1}
      - FOLDER_PRIORITY=${UPLOADER_FOLDER_PRIORITY:-null}
      - MIN_AGE_UPLOAD=${UPLOADER_MIN_AGE_UPLOAD:-1}
      
      # VFS and mount integration
      - VFS_REFRESH_ENABLE=${UPLOADER_VFS_REFRESH:-true}
      - MOUNT=${UPLOADER_MOUNT:-mount-enhanced:8554}
      
      # Logging configuration
      - LOG_ENTRY=${UPLOADER_LOG_ENTRY:-1000}
      - LOG_RETENTION_DAYS=${UPLOADER_LOG_RETENTION_DAYS:-null}
      
      # Autoscan integration
      - AUTOSCAN_URL=${UPLOADER_AUTOSCAN_URL:-http://autoscan:3030}
      - AUTOSCAN_USER=${UPLOADER_AUTOSCAN_USER:-null}
      - AUTOSCAN_PASS=${UPLOADER_AUTOSCAN_PASS:-null}
      
      # Notification settings
      - NOTIFICATION_URL=${UPLOADER_NOTIFICATION_URL:-null}
      - NOTIFICATION_LEVEL=${UPLOADER_NOTIFICATION_LEVEL:-ALL}
      - NOTIFICATION_SERVERNAME=${UPLOADER_NOTIFICATION_SERVERNAME:-HomelabARR}
      
      # Striparr integration
      - STRIPARR_URL=${UPLOADER_STRIPARR_URL:-null}
      
      # Language settings
      - LANGUAGE=${UPLOADER_LANGUAGE:-en}
    
    # Volume configuration using named volumes
    volumes:
      # Uploader configuration and data
      - uploader_config:/config
      - uploader_data:/data
      
      # System configuration access
      - uploader_servicekeys:/opt/appdata/system/servicekeys
      - uploader_system:/opt/appdata/system/uploader
      
      # Access to download directories
      - unionfs:/mnt:ro
      - ${DOWNLOADFOLDER}:/downloads:rw
      
      # Rclone configuration
      - rclone_config:/config/rclone
      
      # Local time for proper timestamps
      - /etc/localtime:/etc/localtime:ro
    
    # Network configuration
    networks:
      - proxy
    
    # Traefik labels for web interface
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      
      # HTTP router
      - "traefik.http.routers.uploader.rule=Host(`uploader.${DOMAIN}`)"
      - "traefik.http.routers.uploader.entrypoints=websecure"
      - "traefik.http.routers.uploader.tls=true"
      - "traefik.http.routers.uploader.tls.certresolver=cloudflare"
      
      # Service configuration
      - "traefik.http.services.uploader.loadbalancer.server.port=9999"
      
      # Authelia authentication
      - "traefik.http.routers.uploader.middlewares=authelia@docker"
      
      # Homepage integration
      - "homepage.group=Upload Management"
      - "homepage.name=Uploader"
      - "homepage.icon=cloud-upload"
      - "homepage.href=https://uploader.${DOMAIN}"
      - "homepage.description=Automated cloud upload management"
      - "homepage.weight=1"
      
      # Container management
      - "dockupdater.enable=true"
    
    # Health monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    
    # Resource management
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.25'
    
    # Service dependencies
    depends_on:
      - mount-enhanced

# Network configuration
networks:
  proxy:
    name: proxy
    external: true

# Named volumes with native bind mounts
volumes:
  uploader_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/uploader/config
  
  uploader_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/uploader/data
  
  uploader_servicekeys:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/system/servicekeys
  
  uploader_system:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/system/uploader
  
  rclone_config:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${APPDATA}/rclone/config
  
  unionfs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${UNIONFS}/unionfs