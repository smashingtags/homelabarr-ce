---
services:
  n8n-mcp:
    image: ghcr.io/smashingtags/homelabarr-n8n-mcp/n8n-mcp:latest
    container_name: n8n-mcp
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - MCP_MODE=http
      - PORT=3000
      # n8n API Configuration (optional)
      - N8N_API_URL=${N8N_API_URL:-}
      - N8N_API_KEY=${N8N_API_KEY:-}
      # MCP Configuration
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - AUTH_TOKEN=${N8N_MCP_AUTH_TOKEN}
    volumes:
      - ${APPDATA_PATH}/n8n-mcp/config:/app/config
      - ${APPDATA_PATH}/n8n-mcp/data:/app/data
    ports:
      - 3333:3000
    networks:
      - proxy
    labels:
      - "traefik.enable=false"
      - "traefik.docker.network=proxy"
      ## HTTP Router
      - "traefik.http.routers.n8n-mcp-rtr.entrypoints=https"
      - "traefik.http.routers.n8n-mcp-rtr.rule=Host(`n8n-mcp.${DOMAIN}`)"
      - "traefik.http.routers.n8n-mcp-rtr.tls=true"
      - "traefik.http.routers.n8n-mcp-rtr.tls.certresolver=dns-cloudflare"
      ## Service
      - "traefik.http.routers.n8n-mcp-rtr.service=n8n-mcp-svc"
      - "traefik.http.services.n8n-mcp-svc.loadbalancer.server.port=3000"
      ## No authentication middleware needed for MCP server
      ## Health Check
      - "health.check.enabled=true"
      - "health.check.endpoint=/health"
      - "health.check.interval=30s"
      - "health.check.timeout=10s"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  proxy:
    external: true