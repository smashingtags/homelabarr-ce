---
services:
  tauticord:
    image: nwithan8/tauticord:latest
    container_name: tauticord
    environment:
      - TC_DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}  # Required: Discord bot token
      - TC_DISCORD_SERVER_ID=${DISCORD_GUILD_ID}  # Required: Discord server ID
      - TC_DISCORD_ADMIN_IDS=${DISCORD_ADMIN_IDS}  # Comma-separated Discord user IDs
      - TC_DISCORD_POST_SUMMARY_MESSAGE=true
      - TC_DISCORD_POST_LIBRARY_STATS=true
      - TC_DISCORD_CHANNEL_NAME=${TAUTICORD_CHANNEL:-tauticord}
      # Tautulli Configuration
      - TC_TAUTULLI_URL=http://tautulli:8181
      - TC_TAUTULLI_KEY=${TAUTULLI_API_KEY}
      # Plex Configuration (Optional for enhanced features)
      - TC_PLEX_URL=http://plex:32400
      - TC_PLEX_TOKEN=${PLEX_TOKEN}
      # Feature Configuration
      - TC_USE_EMBEDS=true
      - TC_USE_THUMBNAILS=true
      - TC_ALLOW_ANALYTICS=true
      - TC_REFRESH_TIME=15  # Seconds between Tautulli data refreshes
      # Voice Channel Stats (Optional)
      - TC_VC_ENABLE=true
      - TC_VC_STREAM_COUNT=true
      - TC_VC_TRANSCODE_COUNT=true
      - TC_VC_BANDWIDTH=true
      - TC_VC_LOCAL_BANDWIDTH=true
      - TC_VC_REMOTE_BANDWIDTH=true
      - TC_VC_PLEX_STATUS=true
      # Activity Monitoring
      - TC_ACTIVITY_ENABLE=true
      - TC_ACTIVITY_MESSAGE="Monitoring Plex"
      # Performance Monitoring
      - TC_PERFORMANCE_MONITORING=true
      - TC_STATS_UPDATE_INTERVAL=60  # Seconds
      # Library Stats
      - TC_LIBRARY_REFRESH_TIME=3600  # Seconds (1 hour)
      - TC_LIBRARY_SHOW_MOVIES=true
      - TC_LIBRARY_SHOW_SERIES=true
      - TC_LIBRARY_SHOW_MUSIC=true
      # Customization
      - TC_EMBED_COLOR=0x00AE86  # Teal color for embeds
      - TC_BOT_PREFIX=${DISCORD_PREFIX:-!}
      - TC_TIMEZONE=${TZ}
    volumes:
      - ${DOCKERCONFDIR}/tauticord:/config
      - ${DOCKERLOGSDIR}/tauticord:/logs
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "dockupdater.enable=true"
      - "homepage.group=Communication"
      - "homepage.name=Tauticord"
      - "homepage.icon=tautulli.png"
      - "homepage.href=https://github.com/nwithan8/tauticord"
      - "homepage.description=Advanced Tautulli Discord bot for Plex stats"
    depends_on:
      - tautulli

networks:
  proxy:
    driver: bridge
    external: true