---
services:
  discord-plex-bot:
    # NOTE: Need to find alternative image source or build our own
    # image: ghcr.io/cyb3rgh05t/discord-bot:latest
    image: homelabarr/discord-plex-bot:latest  # TODO: Build our own
    container_name: discord-plex-bot
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ}
      # Discord Configuration
      - DISCORD_TOKEN=${DISCORD_BOT_TOKEN}  # Required: Your Discord bot token
      - DISCORD_PREFIX=${DISCORD_PREFIX:-!}  # Command prefix
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}  # Your Discord server ID
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}  # Channel for notifications
      # Plex Configuration
      - PLEX_URL=http://plex:32400
      - PLEX_TOKEN=${PLEX_TOKEN}
      - PLEX_SERVER_NAME=${PLEX_SERVER_NAME:-HomelabARR}
      # Tautulli Configuration (Optional)
      - TAUTULLI_URL=http://tautulli:8181
      - TAUTULLI_API_KEY=${TAUTULLI_API_KEY}
      # Bot Features
      - ENABLE_NOW_PLAYING=true
      - ENABLE_LIBRARY_STATS=true
      - ENABLE_NEW_CONTENT=true
      - ENABLE_PLAYBACK_CONTROL=true
      - ENABLE_REQUEST_SYSTEM=false  # Enable if using Overseerr
      # Notification Settings
      - NOTIFY_ON_START=true
      - NOTIFY_ON_STOP=true
      - NOTIFY_ON_PAUSE=false
      - NOTIFY_ON_RESUME=false
      - NOTIFY_ON_NEW_CONTENT=true
    volumes:
      - ${DOCKERCONFDIR}/discord-plex-bot:/config
      - ${DOCKERSTORAGEDIR}/discord-plex-bot:/data
      - ${DOCKERLOGSDIR}/discord-plex-bot:/logs
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "dockupdater.enable=true"
      - "homepage.group=Communication"
      - "homepage.name=Discord Plex Bot"
      - "homepage.icon=discord.png"
      - "homepage.description=Discord bot for Plex notifications and control"
    depends_on:
      - plex

networks:
  proxy:
    driver: bridge
    external: true