services:
  loki:
    hostname: loki
    container_name: hlr-loki
    image: grafana/loki:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
        reservations:
          memory: 256M
          cpus: "0.2"
    command: -config.file=/etc/loki/config.yaml
    volumes:
      - ./config/loki-config.yml:/etc/loki/config.yaml:ro
      - hlr-loki-data:/loki:rw
    networks:
      - monitoring
      - homelabarr
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "monitoring.enable=true"
      - "monitoring.type=logs"
      - "monitoring.service=loki"

  promtail:
    hostname: promtail
    container_name: hlr-promtail
    image: grafana/promtail:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.3"
        reservations:
          memory: 128M
          cpus: "0.1"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
      - homelabarr
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9080/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    labels:
      - "monitoring.enable=true"
      - "monitoring.type=log-collector"
      - "monitoring.service=promtail"

volumes:
  hlr-loki-data:

networks:
  monitoring:
    driver: bridge
  homelabarr:
    external: true
